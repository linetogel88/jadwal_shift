<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>Jadwal Shift - Mobile Full</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    background: linear-gradient(145deg, #e0eafc 0%, #cfdef3 100%);
    min-height: 100vh;
    padding: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .main-container {
    max-width: 650px;
    width: 100%;
    margin: 0 auto;
    background: rgba(255,255,255,0.2);
    border-radius: 48px;
    padding: 12px;
    backdrop-filter: blur(2px);
  }

  /* Header aplikasi */
  .app-header {
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(10px);
    border-radius: 60px;
    padding: 8px 16px;
    margin-bottom: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  .app-header h1 {
    font-size: 1.2rem;
    font-weight: 800;
    background: linear-gradient(135deg, #2c2087, #5e4bdb);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .history-btn {
    background: #2c2087;
    border: none;
    width: 40px;
    height: 40px;
    border-radius: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
  }
  .history-btn span {
    font-size: 24px;
    font-weight: bold;
    color: white;
    transform: rotate(90deg);
    display: inline-block;
  }

  /* Navigasi - kompak untuk mobile */
  .nav-bar {
    background: white;
    border-radius: 50px;
    padding: 6px 12px;
    margin-bottom: 12px;
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  .nav-group {
    display: flex;
    gap: 6px;
    flex: 2;
    justify-content: center;
  }
  .nav-btn {
    background: #2c2087;
    border: none;
    color: white;
    font-weight: bold;
    padding: 6px 12px;
    border-radius: 40px;
    cursor: pointer;
    font-size: 0.75rem;
    transition: 0.1s;
    white-space: nowrap;
  }
  .nav-btn:active { transform: scale(0.96); }
  .nav-btn.disabled {
    background: #aaa;
    cursor: not-allowed;
    opacity: 0.6;
  }
  .today-btn {
    background: #e67e22;
  }
  .date-indicator {
    font-weight: bold;
    font-size: 0.75rem;
    background: #eef2ff;
    padding: 4px 12px;
    border-radius: 40px;
    color: #2c2087;
    text-align: center;
    flex: 3;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* Kartu tanggal utama - tinggi menyesuaikan, tapi tidak memaksa scroll body */
  .date-card {
    background: rgba(255, 255, 255, 0.96);
    border-radius: 28px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .date-header {
    background: linear-gradient(135deg, #2c2087 0%, #1e1666 100%);
    padding: 10px;
    text-align: center;
  }
  .date-header .date-title {
    color: white;
    font-weight: bold;
    font-size: 0.9rem;
  }

  /* Tiga kolom: di mobile jadi vertikal, masing-masing dengan scroll sendiri */
  .three-columns {
    display: flex;
    flex-direction: row;
    flex-wrap: wrap;
    gap: 10px;
    padding: 12px;
  }
  .shift-box {
    flex: 1;
    min-width: 180px;
    background: #fefefe;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    display: flex;
    flex-direction: column;
  }
  .header-shift {
    background: #d7e8ee;
    text-align: center;
    font-weight: 800;
    padding: 8px;
    font-size: 0.85rem;
  }
  .jam {
    text-align: center;
    font-weight: bold;
    padding: 5px;
    font-size: 0.7rem;
  }
  .jam-pagi { background: #90EE90; color: #1e3a1e; }
  .jam-malam { background: #006400; color: white; }
  .offday-title {
    background: #3a1b88;
    color: white;
    text-align: center;
    font-weight: bold;
    padding: 8px;
    font-size: 0.85rem;
  }
  /* Scroll internal pada daftar nama - agar tidak perlu scroll halaman */
  .name-list {
    padding: 0;
    max-height: 45vh;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .name {
    text-align: center;
    padding: 6px;
    font-weight: 600;
    font-size: 0.75rem;
    border-bottom: 1px solid #e9ecef;
    color: white;
    text-shadow: 0 0 1px rgba(0,0,0,0.2);
  }
  .csline { background: #1E3A8A; }
  .cs { background: #87CEEB; color: #000; text-shadow: none; }
  .kks { background: #9B59B6; }
  .ks { background: #2ECC71; }
  .empty {
    text-align: center;
    padding: 16px;
    color: #777;
    font-style: italic;
    font-size: 0.7rem;
  }

  /* Sidebar history (sama seperti sebelumnya, tetap mobile friendly) */
  .sidebar {
    position: fixed;
    top: 0;
    right: -320px;
    width: 280px;
    height: 100%;
    background: white;
    box-shadow: -5px 0 20px rgba(0,0,0,0.2);
    transition: right 0.3s ease;
    z-index: 1000;
    display: flex;
    flex-direction: column;
    border-radius: 20px 0 0 20px;
  }
  .sidebar.open { right: 0; }
  .sidebar-header {
    background: #2c2087;
    color: white;
    padding: 18px;
    font-size: 1.2rem;
    font-weight: bold;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .close-sidebar {
    background: none;
    border: none;
    font-size: 26px;
    color: white;
    cursor: pointer;
  }
  .history-list {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
  }
  .history-item {
    background: #f1f5f9;
    margin-bottom: 10px;
    padding: 12px;
    border-radius: 20px;
    cursor: pointer;
    font-weight: 600;
    font-size: 0.85rem;
    border-left: 5px solid #2c2087;
  }
  .overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.4);
    visibility: hidden;
    opacity: 0;
    transition: 0.2s;
    z-index: 999;
  }
  .overlay.active { visibility: visible; opacity: 1; }

  /* Responsive: di layar sangat kecil, kolom vertikal dan nama lebih kecil */
  @media (max-width: 550px) {
    .three-columns {
      flex-direction: column;
    }
    .shift-box {
      width: 100%;
    }
    .name-list {
      max-height: 35vh;
    }
    .nav-group {
      flex: 1;
      justify-content: space-between;
    }
    .date-indicator {
      font-size: 0.7rem;
      padding: 4px 8px;
    }
    .nav-btn {
      padding: 5px 10px;
      font-size: 0.7rem;
    }
  }

  /* Untuk layar yang lebih besar, tetap pakai horizontal */
  @media (min-width: 551px) {
    .three-columns {
      flex-direction: row;
    }
    .name-list {
      max-height: 50vh;
    }
  }
</style>
</head>
<body>
<div class="main-container">
  <div class="app-header">
    <h1>📋 Jadwal Shift</h1>
    <button class="history-btn" id="historyBtn"><span>⋮</span></button>
  </div>

  <div class="nav-bar">
    <div class="nav-group">
      <button class="nav-btn" id="prevBtn">◀</button>
      <button class="nav-btn today-btn" id="todayBtn">🏠 Hari Ini</button>
      <button class="nav-btn" id="nextBtn">▶</button>
    </div>
    <div class="date-indicator" id="dateIndicator">-</div>
  </div>

  <div id="mainContent">Memuat jadwal...</div>
</div>

<!-- Sidebar history -->
<div class="sidebar" id="historySidebar">
  <div class="sidebar-header">
    📜 History Shift
    <button class="close-sidebar" id="closeSidebarBtn">✕</button>
  </div>
  <div class="history-list" id="historyList">Loading...</div>
</div>
<div class="overlay" id="overlay"></div>

<script>
const SHEET_ID = "1PF5foBN9USoU7XBct6u4uOObUdnH30c1MPoKzHuhv6w";
const GID = "0";
const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${GID}`;

const roleOrder = ["CS LINE", "CS", "KKS", "KS"];

// Mapping bahasa
const hariIndonesia = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
const bulanIndonesia = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];

function parseDateObject(value) {
  if (!value) return null;
  let str = String(value).trim();
  let match = str.match(/Date\((\d+),(\d+),(\d+)\)/);
  if (match) return new Date(parseInt(match[1]), parseInt(match[2]), parseInt(match[3]));
  let regex = /([A-Za-z]+),\s*(\d{1,2})\s+([A-Za-z]+)\s+(\d{4})/i;
  let m = str.match(regex);
  if (m) {
    const bulanMap = { JANUARY:0, FEBRUARY:1, MARCH:2, APRIL:3, MAY:4, JUNE:5, JULY:6, AUGUST:7, SEPTEMBER:8, OCTOBER:9, NOVEMBER:10, DECEMBER:11 };
    let bulanIdx = bulanMap[m[3].toUpperCase()];
    if (bulanIdx !== undefined) return new Date(parseInt(m[4]), bulanIdx, parseInt(m[2]));
  }
  if (!isNaN(str) && str.length > 5) {
    let num = parseFloat(str);
    let excelEpoch = new Date(1899, 11, 30);
    let d = new Date(excelEpoch.getTime() + num * 86400000);
    if (!isNaN(d.getTime()) && d.getFullYear() > 1900) return d;
  }
  let d = new Date(str);
  return isNaN(d.getTime()) ? null : d;
}

function formatTanggalIndonesia(dateObj) {
  if (!dateObj) return "";
  return `${hariIndonesia[dateObj.getDay()]}, ${dateObj.getDate()} ${bulanIndonesia[dateObj.getMonth()]} ${dateObj.getFullYear()}`;
}

function getDateOnly(dateObj) {
  return new Date(dateObj.getFullYear(), dateObj.getMonth(), dateObj.getDate());
}

let allDates = [];
let currentIndex = 0;

function renderCurrentDate() {
  if (!allDates.length) return;
  const item = allDates[currentIndex];
  const { formatted, data } = item;
  
  document.getElementById("dateIndicator").innerText = formatted;
  const prevBtn = document.getElementById("prevBtn");
  const nextBtn = document.getElementById("nextBtn");
  if (currentIndex === 0) prevBtn.classList.add("disabled");
  else prevBtn.classList.remove("disabled");
  if (currentIndex === allDates.length - 1) nextBtn.classList.add("disabled");
  else nextBtn.classList.remove("disabled");
  
  const html = `
    <div class="date-card">
      <div class="date-header">
        <div class="date-title">📅 ${formatted}</div>
      </div>
      <div class="three-columns">
        ${renderShiftBox("PAGI", "07:45 - 19:45", data.PAGI, "pagi")}
        ${renderOffdayBox(data.OFFDAY)}
        ${renderShiftBox("MALAM", "19:45 - 07:45", data.MALAM, "malam")}
      </div>
    </div>
  `;
  document.getElementById("mainContent").innerHTML = html;
}

function renderShiftBox(title, jam, list, shiftType) {
  const jamClass = shiftType === "pagi" ? "jam-pagi" : "jam-malam";
  let namesHtml = list.length ? '' : '<div class="empty">Tidak ada staff</div>';
  list.forEach(item => {
    let roleClass = '';
    if (item.role === "CS LINE") roleClass = "csline";
    else if (item.role === "CS") roleClass = "cs";
    else if (item.role === "KKS") roleClass = "kks";
    else if (item.role === "KS") roleClass = "ks";
    namesHtml += `<div class="name ${roleClass}">${item.nama}</div>`;
  });
  return `
    <div class="shift-box">
      <div class="header-shift">${title}</div>
      <div class="jam ${jamClass}">${jam}</div>
      <div class="name-list">${namesHtml}</div>
    </div>
  `;
}

function renderOffdayBox(list) {
  let namesHtml = list.length ? '' : '<div class="empty">Tidak ada staff</div>';
  list.forEach(item => {
    let roleClass = '';
    if (item.role === "CS LINE") roleClass = "csline";
    else if (item.role === "CS") roleClass = "cs";
    else if (item.role === "KKS") roleClass = "kks";
    else if (item.role === "KS") roleClass = "ks";
    namesHtml += `<div class="name ${roleClass}">${item.nama}</div>`;
  });
  return `
    <div class="shift-box">
      <div class="offday-title">🚫 OFFDAY</div>
      <div class="name-list">${namesHtml}</div>
    </div>
  `;
}

function nextDate() {
  if (currentIndex < allDates.length - 1) {
    currentIndex++;
    renderCurrentDate();
  }
}
function prevDate() {
  if (currentIndex > 0) {
    currentIndex--;
    renderCurrentDate();
  }
}
function goToToday() {
  const today = getDateOnly(new Date());
  let foundIndex = allDates.findIndex(d => d.dateObj >= today);
  if (foundIndex === -1 && allDates.length) foundIndex = allDates.length - 1;
  if (foundIndex !== -1 && foundIndex !== currentIndex) {
    currentIndex = foundIndex;
    renderCurrentDate();
  }
}

let sidebar, overlay;
function openSidebar() { sidebar.classList.add('open'); overlay.classList.add('active'); }
function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('active'); }

fetch(url)
  .then(res => res.text())
  .then(text => {
    const json = JSON.parse(text.substring(47).slice(0, -2));
    const rows = json.table.rows;
    function getCell(r, c) {
      const cell = rows[r]?.c[c];
      if (!cell) return "";
      let val = cell.f !== undefined && cell.f !== null ? cell.f : (cell.v !== undefined ? cell.v : "");
      return String(val).trim();
    }

    let tanggalRowIndex = -1;
    for (let r = 0; r <= Math.min(4, rows.length-1); r++) {
      for (let col = 4; col <= 27; col++) {
        if (getCell(r, col) && (getCell(r, col).includes("Date") || getCell(r, col).match(/\d/))) {
          tanggalRowIndex = r; break;
        }
      }
      if (tanggalRowIndex !== -1) break;
    }
    if (tanggalRowIndex === -1) throw new Error("Baris tanggal tidak ditemukan");

    let startRow = 5;
    for (let r = 3; r <= 40; r++) if (getCell(r, 1)) { startRow = r; break; }
    let endRow = startRow;
    for (let r = startRow; r <= Math.min(100, rows.length-1); r++) {
      if (getCell(r, 1)) endRow = r;
      else {
        let empty = 0;
        for (let i = r; i <= r+2 && i < rows.length; i++) if (!getCell(i,1)) empty++;
        if (empty >= 3) break;
      }
    }

    for (let col = 4; col <= 27; col++) {
      let rawDate = getCell(tanggalRowIndex, col);
      let dateObj = parseDateObject(rawDate);
      if (!dateObj) continue;
      let dataShift = { PAGI: [], MALAM: [], OFFDAY: [] };
      for (let row = startRow; row <= endRow; row++) {
        let nama = getCell(row, 1);
        let role = getCell(row, 3).toUpperCase();
        let shift = getCell(row, col).toUpperCase();
        if (nama && dataShift[shift]) dataShift[shift].push({ nama, role });
      }
      Object.keys(dataShift).forEach(s => {
        dataShift[s].sort((a,b) => roleOrder.indexOf(a.role) - roleOrder.indexOf(b.role));
      });
      allDates.push({
        dateObj: getDateOnly(dateObj),
        formatted: formatTanggalIndonesia(dateObj),
        data: dataShift
      });
    }
    allDates.sort((a,b) => a.dateObj - b.dateObj);
    if (allDates.length === 0) throw new Error("Tidak ada data jadwal");
    
    const today = getDateOnly(new Date());
    let foundIndex = allDates.findIndex(d => d.dateObj >= today);
    if (foundIndex === -1) foundIndex = allDates.length - 1;
    currentIndex = foundIndex;
    renderCurrentDate();
    
    const expiredDates = allDates.filter(d => d.dateObj < today);
    const historyListDiv = document.getElementById("historyList");
    if (expiredDates.length === 0) {
      historyListDiv.innerHTML = '<div style="padding:16px; text-align:center;">Belum ada shift lewat</div>';
    } else {
      let historyHtml = '';
      expiredDates.forEach((item, idx) => {
        historyHtml += `<div class="history-item" data-idx="${idx}">📅 ${item.formatted}</div>`;
      });
      historyListDiv.innerHTML = historyHtml;
      document.querySelectorAll('.history-item').forEach(el => {
        el.addEventListener('click', (e) => {
          const idx = parseInt(el.dataset.idx);
          const targetDate = expiredDates[idx].dateObj;
          const realIndex = allDates.findIndex(d => d.dateObj.getTime() === targetDate.getTime());
          if (realIndex !== -1) {
            currentIndex = realIndex;
            renderCurrentDate();
            closeSidebar();
          }
        });
      });
    }
    
    document.getElementById("prevBtn").addEventListener("click", prevDate);
    document.getElementById("nextBtn").addEventListener("click", nextDate);
    document.getElementById("todayBtn").addEventListener("click", goToToday);
    
    sidebar = document.getElementById("historySidebar");
    overlay = document.getElementById("overlay");
    document.getElementById("historyBtn").addEventListener("click", openSidebar);
    document.getElementById("closeSidebarBtn").addEventListener("click", closeSidebar);
    overlay.addEventListener("click", closeSidebar);
  })
  .catch(err => {
    document.getElementById("mainContent").innerHTML = `<div style="background:#fff0f0; padding:20px; border-radius:28px;">❌ Gagal: ${err.message}</div>`;
    console.error(err);
  });
</script>
</body>
</html>
